# Tight static grid designed to actually get filled so we can verify the
# fill-handling path (Trade event → InventoryTracker update → adjacent
# re-arm). Adjust `lower_price` / `upper_price` to straddle current mid.

[engine]
tick_interval_ms = 2000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
private_key_hex = ""

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
lower_price = "77200"
upper_price = "77800"
num_levels = 13                 # spacing = $50 (~0.065%)
order_size = "0.0001"
order_type = "post_only"
max_position = "0.001"

[logging]
level = "info"
