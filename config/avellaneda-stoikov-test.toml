# Aggressive A-S config for testing the orderbook quoting path on Bullet.
# Tuned for *visibility* — expect a re-quote roughly every second on BTC,
# with the slot prices visibly tracking Binance mid in the tick log.
#
# NOT a production config — the threshold is well below where round-trip
# fees are recovered. Use `avellaneda-stoikov-example.toml` for anything
# resembling a real run.
#
# Run with: cargo run --bin bb-bot -- run --config config/avellaneda-stoikov-test.toml

[engine]
tick_interval_ms = 200
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
# Key material — do NOT put private keys in this file.
# Option 1 (preferred): key_file = "/path/to/id.json"  (run `bb-bot keygen`)
# Option 2 (CI/ephemeral): export BB_BULLET_PRIVATE_KEY_HEX="0x..."

[strategy]
type = "avellaneda-stoikov"

[strategy.avellaneda-stoikov]
symbol = "BTC-USD"

# Fair-value MM: anchor to Binance mid since Bullet testnet is too thin to
# self-price. Required for the requote-per-second behavior — local Bullet
# book on testnet barely moves.
reference_exchange = "binance"
reference_symbol = "btcusdt"
reference_market = "perp"
reference_stale_secs = 10

# Small size; we only want to see the quote-path behavior, not push real risk.
order_size = "0.001"
max_position = "0.01"
inventory_target = "0"

# Standard A-S params.
gamma = "0.5"
kappa = "1.5"
order_horizon_secs = 10
vol_window_secs = 60

# Forced-refresh fallback (rarely used since reference feed drives refreshes).
order_refresh_secs = 1

# Tight quotes — at the maker-fee floor to actually get fills on testnet.
min_half_spread_bps = "1"
max_half_spread_bps = "10"

# Aggressive amend cadence — threshold 0 means "amend at every cooldown
# expiry" (microprice always differs slightly between events, so something
# is always stale). The cooldown becomes the actual rate limiter. 500ms
# gives ~2 amends/sec — sub-second visibility into the orderbook quoting
# path without hammering the API.
amend_threshold_bps = "0"
amend_threshold_step_bps = "0"
min_refresh_interval_ms = 500

# Multi-level ladder — same as the production example so the orderbook
# shape on Bullet looks realistic.
order_levels = 5
order_level_spread_bps = "2"
order_level_amount_step = "0.1"

order_type = "post_only"

[strategy.avellaneda-stoikov.fees]
maker_bps = "1.0"
taker_bps = "4.0"
min_spread_fee_multiplier = "1.0"

[logging]
# Debug level shows "ref mid changed" lines whenever Binance sends a new
# distinct mid — useful to distinguish "the feed is sending size-only
# updates" (vol_samples climbs but mid pinned) from "the feed is dead"
# (no events at all).
level = "info"
