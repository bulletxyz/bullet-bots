# Static grid bot — reference config.
#
# Static grid: N uniformly-spaced levels across [lower_price, upper_price].
# Levels are placed once at startup and NEVER move. Price leaving the range
# means the grid idles until it returns.
#
# Bias is expressed by `anchor_price`:
#   - near `lower_price`  → more sell levels → short bias
#   - near `upper_price`  → more buy levels  → long bias
#   - omitted             → defaults to current mid → neutral at start
#
# Run: cargo run --bin bb-bot -- run --config config/grid-example.toml
#
# ADJUST THE RANGE BEFORE RUNNING: lower_price / upper_price must straddle
# the current market price or the grid starts idle. The values below are
# placeholders — set them to your expected trading range before running.

[engine]
tick_interval_ms = 5000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
# Key material — do NOT put private keys in this file.
# Option 1 (preferred): key_file = "/path/to/id.json"  (run `bb-bot keygen`)
# Option 2 (CI/ephemeral): export BB_BULLET_PRIVATE_KEY_HEX="0x..."

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
lower_price = "80000"           # placeholder — set to your expected range
upper_price = "100000"          # placeholder — set to your expected range
num_levels = 21                 # 20 gaps × $1000 = $20k range; adjust with price range
# anchor_price = "90000"        # optional — defaults to current mid
order_size = "0.001"
order_type = "post_only"
max_position = "0.010"          # 10× order_size; caps inventory on one-sided moves

# Fee-floor guardrail: refuses to start if spacing can't cover
# `min_spacing_fee_multiplier × round-trip maker fees`.
[strategy.grid.fees]
maker_bps = "1.0"
taker_bps = "5.0"
min_spacing_fee_multiplier = "3.0"

# Optional EMA trend filter: pause placement when fast/slow EMA divergence in
# basis points exceeds the threshold. Keeps you from adding to your bag in
# a strong trend.
[strategy.grid.trend_filter]
fast_secs = 300
slow_secs = 3600
pause_divergence_bps = "50"

[logging]
level = "info"
