# Static grid bot example config for Bullet testnet.
# Run with: cargo run --bin bb-bot -- run --config config/grid-example.toml
#
# Static grid: N uniformly-spaced levels across [lower_price, upper_price].
# Levels are placed once at startup and NEVER moved. Price leaving the range
# = grid goes idle until price returns.
#
# Bias is expressed by `anchor_price` inside the range:
#   - anchor near `lower_price` → more sell levels → short bias
#   - anchor near `upper_price` → more buy levels → long bias
#   - omit `anchor_price` → use current mid at startup (neutral)

[engine]
tick_interval_ms = 5000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
# Set via environment: export BB_BULLET_PRIVATE_KEY_HEX="0x..."
private_key_hex = ""

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
# Pick a range where you think price will oscillate.
lower_price = "70000"
upper_price = "85000"
num_levels = 31                 # spacing = (upper-lower)/(N-1) = $500/level (~0.65%)
# anchor_price = "77500"        # explicit — defaults to mid at startup if omitted
order_size = "0.001"
order_type = "post_only"
max_position = "0.015"          # 15× order_size; caps inventory on strong one-sided moves

# Fee-floor guardrail: refuses to start if spacing can't cover
# `min_spacing_fee_multiplier × round-trip maker fees`.
[strategy.grid.fees]
maker_bps = "1.0"
taker_bps = "5.0"
min_spacing_fee_multiplier = "3.0"

# Optional EMA trend filter: pause placement when fast/slow EMA divergence in
# basis points exceeds the threshold. Useful on a static grid so you stop
# adding to your bag during strong trends.
[strategy.grid.trend_filter]
fast_secs = 300
slow_secs = 3600
pause_divergence_bps = "50"

[logging]
level = "info"
