# Grid trading bot example config for Bullet testnet.
# Run with: cargo run --bin bb-bot -- run --config config/grid-example.toml

[engine]
tick_interval_ms = 5000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
# Set via environment: export BB_BULLET_PRIVATE_KEY_HEX="0x..."
private_key_hex = ""

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
num_levels = 5
spacing_mode = "geometric"
grid_spacing = "0.5"
order_size = "0.001"
order_type = "post_only"
max_position = "0.01"
rebalance_threshold_pct = "0.5"   # ≤ grid_spacing — rebalance before level-1 crosses
# Minimum seconds between rebalances. Suppresses fee churn in whippy markets.
rebalance_cooldown_secs = 30
# Inventory skew: widens quotes on the leaned side proportional to net
# position / max_position. 0 disables (reverts to symmetric grid).
inventory_skew_k = "0.3"

# Optional fee-floor guardrail. Refuses to run if spacing can't cover
# `min_spacing_fee_multiplier` × round-trip maker fees.
[strategy.grid.fees]
maker_bps = "1.0"
taker_bps = "5.0"
min_spacing_fee_multiplier = "3.0"

# Optional EMA trend filter. When fast vs slow EMA divergence in basis points
# exceeds the threshold, all live orders are cancelled and placement pauses
# until the slope relaxes. Cheapest defence against bleeding in trends.
[strategy.grid.trend_filter]
fast_secs = 300
slow_secs = 3600
pause_divergence_bps = "50"

[logging]
level = "info"
