# Static grid tuned to generate visible fills on Bullet testnet.
#
# Tight range (~1% total) around a moving market gives a lot of oscillations
# through inner levels. Small order size so a handful of fills is cheap.

[engine]
tick_interval_ms = 2000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
private_key_hex = ""

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
lower_price = "77000"
upper_price = "78000"
num_levels = 21                 # spacing = $50 (~0.065%)
order_size = "0.0001"           # BTC step_size minimum
order_type = "post_only"
max_position = "0.002"          # 20 levels' worth of one-sided fills

[logging]
level = "info"
