# Grid config tuned to generate visible fills on Bullet testnet.
#
# Rationale:
#  - spacing 0.05% (~$40 per level at $78k BTC) puts level 1 just outside the
#    spread. Small market moves cross it → maker fills.
#  - 10 levels per side = 20 resting orders; something is almost always at risk.
#  - Fast rebalance (0.15%) re-centers the grid quickly when the tape drifts,
#    so idle orders don't sit stale for hours.
#  - Small per-order size (0.0001 BTC, the LOT_SIZE minimum) means many fills
#    before `max_position` pauses one side.

[engine]
tick_interval_ms = 2000
status_port = 3030

[exchanges.bullet]
type = "bullet"
network = "testnet"
private_key_hex = ""

[strategy]
type = "grid"

[strategy.grid]
symbol = "BTC-USD"
num_levels = 10
spacing_mode = "geometric"
grid_spacing = "0.05"         # 0.05% → ~$40/level at $78k BTC
order_size = "0.0001"         # step_size minimum for BTC-USD
order_type = "post_only"
max_position = "0.005"
rebalance_threshold_pct = "0.15"

[logging]
level = "info"
