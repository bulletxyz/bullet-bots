[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
commit_parsers = [
  { message = "^[Ff]eat|^[Aa]dd",       group = "Features"       },
  { message = "^[Ff]ix|^[Bb]ug",         group = "Bug Fixes"      },
  { message = "^[Pp]erf",                group = "Performance"    },
  { message = "^[Rr]efactor",            group = "Refactoring"    },
  { message = "^[Dd]oc|^README",         group = "Documentation"  },
  { message = "^[Tt]est",                group = "Testing"        },
  { message = "^[Cc]hore|^[Cc][Ii]|^ci", group = "Maintenance"   },
  { message = ".*",                       group = "Changes"        },
]
tag_pattern = "v[0-9].*"
