<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="p" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.1" fill="#C8FF00" opacity="0.10"/>
    </pattern>
    <clipPath id="r">
      <rect width="900" height="180" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" rx="12" fill="#0C0C0C"/>
  <rect width="900" height="180" fill="url(#p)" clip-path="url(#r)"/>
  <!-- Border -->
  <rect x="1" y="1" width="898" height="178" rx="11" stroke="#C8FF00" stroke-width="1" opacity="0.22"/>

  <!-- ── BOT LOGOMARK ── -->
  <!-- Left antenna -->
  <line x1="62" y1="40" x2="62" y2="22" stroke="#C8FF00" stroke-width="6" stroke-linecap="round"/>
  <circle cx="62" cy="17" r="5" fill="#C8FF00"/>
  <!-- Right antenna (taller) -->
  <line x1="77" y1="40" x2="77" y2="15" stroke="#C8FF00" stroke-width="6" stroke-linecap="round"/>
  <circle cx="77" cy="10" r="5" fill="#C8FF00"/>
  <!-- Crossbar -->
  <rect x="34" y="40" width="57" height="11" rx="5.5" fill="#C8FF00"/>
  <!-- Stem -->
  <rect x="79" y="40" width="11" height="104" rx="5.5" fill="#C8FF00"/>
  <!-- Bowl (the 'b' curve — cubic bezier gives a smooth D-shape) -->
  <path d="M 90,76 C 152,76 152,144 90,144" stroke="#C8FF00" stroke-width="11" stroke-linecap="round"/>

  <!-- ── TEXT ── -->
  <text x="176" y="89"
        font-family="ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace"
        font-size="50" font-weight="700" fill="white">bullet<tspan fill="#C8FF00">-bots</tspan></text>
  <text x="177" y="120"
        font-family="ui-monospace,'SF Mono','Cascadia Code','Courier New',monospace"
        font-size="14" fill="#484848">open-source algo trading  ·  Bullet  ·  Hyperliquid  ·  Binance</text>

  <!-- ── SEPARATOR ── -->
  <line x1="617" y1="28" x2="617" y2="152" stroke="#C8FF00" stroke-width="1" opacity="0.12"/>

  <!-- ── CANDLESTICK CHART ── -->
  <!-- 8 candles, ascending trend, x centers spaced 24px from 632 -->
  <!-- Baseline -->
  <line x1="620" y1="150" x2="812" y2="150" stroke="#C8FF00" stroke-width="1" opacity="0.15"/>

  <!-- c1 x=632 -->
  <line x1="632" y1="125" x2="632" y2="148" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="625" y="128" width="14" height="14" rx="2" fill="#C8FF00"/>

  <!-- c2 x=656 -->
  <line x1="656" y1="116" x2="656" y2="140" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="649" y="119" width="14" height="16" rx="2" fill="#C8FF00"/>

  <!-- c3 x=680 -->
  <line x1="680" y1="106" x2="680" y2="130" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="673" y="109" width="14" height="16" rx="2" fill="#C8FF00"/>

  <!-- c4 x=704 (bearish consolidation, outlined) -->
  <line x1="704" y1="100" x2="704" y2="122" stroke="#C8FF00" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <rect x="697" y="103" width="14" height="13" rx="2" stroke="#C8FF00" stroke-width="1.5" opacity="0.55"/>

  <!-- c5 x=728 -->
  <line x1="728" y1="86" x2="728" y2="112" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="721" y="89" width="14" height="18" rx="2" fill="#C8FF00"/>

  <!-- c6 x=752 (breakout) -->
  <line x1="752" y1="68" x2="752" y2="99" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="745" y="71" width="14" height="23" rx="2" fill="#C8FF00"/>

  <!-- c7 x=776 -->
  <line x1="776" y1="54" x2="776" y2="83" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="769" y="57" width="14" height="21" rx="2" fill="#C8FF00"/>

  <!-- c8 x=800 -->
  <line x1="800" y1="46" x2="800" y2="71" stroke="#C8FF00" stroke-width="2" stroke-linecap="round"/>
  <rect x="793" y="49" width="14" height="16" rx="2" fill="#C8FF00"/>

  <!-- Trend line (dashed, through body tops) -->
  <polyline points="632,128 656,119 680,109 704,103 728,89 752,71 776,57 800,49"
            stroke="#C8FF00" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.28"/>
</svg>
